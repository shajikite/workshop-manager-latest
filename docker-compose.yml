version: '3.8'

services:
  programme-manager:
    build: .
    container_name: programme-manager
    ports:
      - "8080:8080"  # Add this line - maps host port 8080 to container port 8080
    volumes:
      - ./data:/app/data
      - ./programme_manager.db:/app/programme_manager.db
    environment:
      - FLASK_ENV=development
      - PORT=8080
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
